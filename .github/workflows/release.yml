name: Release

# Push a tag equal to the manifest version (e.g. 0.3.0) to build and publish a
# GitHub release with main.js + manifest.json attached as assets (what BRAT and
# the Obsidian community store consume).
on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            main.js
            manifest.json

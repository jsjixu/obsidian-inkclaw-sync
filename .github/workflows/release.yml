name: Release

# Push a tag equal to the manifest version (e.g. 0.6.0) to build and publish a
# GitHub release with main.js + manifest.json + styles.css attached as assets
# (what BRAT and the Obsidian community store consume).
on:
  push:
    tags:
      - "*"

permissions:
  contents: write # create the release
  id-token: write # mint the OIDC token for attestation
  attestations: write # record build provenance for main.js

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Attest build provenance for release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
